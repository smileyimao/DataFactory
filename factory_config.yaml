# 🏭 Datafactory 生产标准配置文件 (v1.0)
# 修改此文件即可改变质检严苛程度，无需修改代码

quality_thresholds:
  # 1. 亮度门槛 (Brightness)
  min_brightness: 55.0    # 低于此值判定为 "Too Dark" (刚才那帧42.8会被拦截)
  max_brightness: 225.0   # 高于此值判定为 "Harsh Light" (过曝)

  # 2. 清晰度门槛 (Blur/Laplacian Variance)
  # 建议：高清视频通常 > 100，普通 50-80，废片 < 15
  min_blur_score: 20.0    # 低于此值判定为 "Blurry" (刚才那帧4.55会被拦截)

  # 3. 画面稳定性 (Jitter/Frame Diff)
  max_jitter: 35.0        # 帧间剧烈晃动阈值

  # 4. 对比度/丰富度 (Standard Deviation)
  min_contrast: 15.0      # 画面过于灰暗或单一色彩的判定线
  max_contrast: 100.0     # 画面过于杂乱判定线


# 🏭 生产流程控制
production_setting:
  trial_limit_seconds: 10  # 👈 默认试产 5 秒
  pass_rate_gate: 75.0    # (刚才咱们加的及格线)


