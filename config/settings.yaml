# 🏭 DataFactory 配置中心 (v1.6)
# 路径均相对于项目根目录 (base_dir)，由 config_loader 解析为绝对路径
# 工业级：路径解耦，改名只需改此处，支持 env 覆盖（如 DATA_WAREHOUSE）
# v2.9：modality 解耦，未来可扩展 audio/vibration（predictive maintenance）

modality: video   # video | audio | vibration（v3 扩展）

paths:
  raw_video: "storage/raw"
  test_source: "storage/test/original"   # 测试模式：从此复制到 raw，pipeline 不改动此目录
  data_warehouse: "storage/archive"
  dashboard_port: 8765   # 厂长中控台端口
  rejected_material: "storage/rejected"
  redundant_archives: "storage/redundant"
  reports: "storage/reports"
  labeling_export: "storage/for_labeling"   # 可选：导出待标注清单目录（scripts/export_for_labeling.py）
  labeled_return: "storage/labeled_return"   # 标注回传落盘目录（scripts/import_labeled_return.py）
  training: "storage/training"                # 达标数据并入的训练集根目录
  golden: "storage/golden"                 # 黄金库：开机自检时真跑一遍用；边缘部署可改为挂载点如 /opt/factory/golden
  pending_review: "storage/pending_review"   # 待复核队列目录（中控台 dashboard）
  quarantine: "storage/quarantine"           # Ingest 预检：重复/解码失败视频移入此目录
  logs: "logs"
  db_file: "db/factory_admin.db"

  # 批次目录结构（path decoupling：改名只改此处）
  batch_prefix: "Batch_"
  batch_fails_suffix: "_Fails"
  batch_subdirs:
    reports: "reports"
    source: "source"
    refinery: "refinery"
    inspection: "inspection"
    labeled: "labeled"   # 人工标注回传落盘（import_labeled_return 达标后按 batch_id 写回）

  # 启动时确保存在的目录（可覆盖以适配自定义部署）
  ensure_dirs: [raw_video, data_warehouse, rejected_material, redundant_archives, reports, labeling_export, labeled_return, training, golden, test_source, pending_review, quarantine, logs]

ingest:
  batch_wait_seconds: 8
  poll_interval_seconds: 30   # 轮询兜底：每 N 秒扫 raw，Watchdog 漏检时仍能发现（0=不轮询）
  video_extensions: [".mp4", ".mov", ".avi", ".mkv"]
  file_stable_check_interval: 1
  file_stable_min_seconds: 2
  # Ingest 预检：在送入 pipeline 前做 dedup + 首帧解码检查，失败项移入 quarantine
  pre_filter_enabled: true
  dedup_at_ingest: true
  decode_check_at_ingest: true

quality_thresholds:
  min_brightness: 55.0
  max_brightness: 225.0
  min_blur_score: 20.0
  min_contrast: 15.0
  max_contrast: 100.0
  max_jitter: 35.0

production_setting:
  qc_sample_seconds: 10   # 每视频抽检秒数，用于质量判定（重复检测+不合格检测）
  pass_rate_gate: 85.0    # 单门槛时：>= 为合格
  dual_gate_high: null   # v2 双门槛：>= 自动放行；null 则仅用 pass_rate_gate
  dual_gate_low: null    # v2 双门槛：< 自动拦截；null 则用单门槛
  save_normal: true
  save_warning: true
  save_only_screened: false  # true=只落盘「Warning 或 有 YOLO 检测」的帧，减少全量切片（见 docs/smart_slicing.md）
  confidence_tiered_output: true   # true=按置信分层落盘(refinery、inspection)；false=全部写 refinery
  approved_split_confidence_threshold: 0.6   # 放行项按 YOLO 置信度分流：max_conf>=此值→refinery，否则→inspection
  human_review_flat: true   # true=inspection 精简：Normal/Warning 合并，只保留 manifest+图+txt 便于 for_labeling 导入

review:
  mode: dashboard   # terminal=终端逐项 y/n；dashboard=入队由中控台复核
  timeout_seconds: 600
  valid_inputs: ["y", "n", "all", "none"]

email_setting:
  smtp_server: "smtp.mail.me.com"
  smtp_port: 587
  sender: "smileyimao@icloud.com"
  receiver: "xituled@gmail.com"
  max_retries: 3        # P2 邮件发送重试
  retry_delay_seconds: 5

# v2.0 视觉质检（YOLO）：开关、模型路径、抽帧与推理参数（均从配置读取，无硬编码）
vision:
  enabled: true
  model_path: "models/yolov8s.pt"    # 主模型（small）；留空则不加载
  sample_seconds: 10       # 抽帧间隔（秒），与 production_setting.qc_sample_seconds 对齐或扩展
  # 四板斧：高效筛查
  use_i_frame_only: false   # true=只解 I-帧（需 ffprobe），减少解码量
  motion_threshold: 0       # 运动唤醒：帧差低于此值不跑 YOLO，0=关闭
  cascade_light_model_path: "models/yolov8n.pt"   # 级联初筛：nano 轻量模型，有东西才上主模型
  cascade_light_conf: 0.2   # 级联轻量模型置信度阈值
  # 推理参数（predict）：未配置时由 config_loader 填入工业默认值
  conf: 0.25                # 置信度阈值 [0,1]
  iou: 0.45                 # NMS IoU 阈值
  classes: null             # 过滤类别 ID 列表，null 为全部
  device: null              # 推理设备，如 "cuda:0" / "cpu" / null 自动
  max_det: 300              # 每图最大检测框数
  imgsz: 640                # 输入尺寸（边长）
  half: false               # FP16 半精度（GPU）
  verbose: false            # 是否打印推理日志

# v2.0 MLflow（可选）：批次级实验与指标记录
mlflow:
  enabled: true
  experiment_name: "datafactory"
  tracking_uri: null   # null 则用 db/mlflow.db（config_loader 默认）

# M2 版本映射：日志与元数据中可写可读，便于 v4 血缘与审计
version_mapping:
  algorithm_version: "rules_v1"   # 规则质检算法版本
  vision_model_version: ""       # 视觉模型版本，留空则由运行时加载的模型路径填充

# P1 工业级：时区、日志轮转
timezone: "America/Toronto"
logging:
  max_bytes: 10485760   # 10MB 单文件，超则轮转
  backup_count: 5       # 保留 5 个历史文件

# 开机自检与滚动清零（全球/边缘部署可按存储环境覆盖）
startup_self_check: true    # 启动时校验配置与关键目录可写，失败则退出
startup_golden_run: false  # 为 true 时用 paths.golden 下视频真跑一遍 QC，失败则退出（edge 建议开启）

# 待标池自动更新：每批归档后自动将 inspection 追加到 for_labeling
labeling_pool:
  auto_update_after_batch: true

# 标注回传与伪标签一致性校验（多级净化）
labeled_return:
  consistency_threshold: 0.95   # 一致率低于此值报警，要求差异部分复核
  alert_via_email: true        # 是否发邮件报警（使用 email_setting）

# P0 工业级：文件操作重试（瞬时故障如 NFS 抖动）
retry:
  max_attempts: 3
  backoff_seconds: 1.0

rolling_cleanup:
  logs_retention_days: 30      # 日志保留天数，超期删除（0=不删）
  reports_retention_days: 30   # 报表保留天数，超期删除（0=不删）
  archive_retention_days: 0    # 成品库归档保留天数（0=不自动删，谨慎开启）
