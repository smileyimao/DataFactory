# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║            DataFactory — 配置中心                                           ║
# ║                                                                              ║
# ║  按流程分区，快速定位：                                                       ║
# ║   §1 系统基础      §2 存储路径      §3 数据摄入                               ║
# ║   §4 质量控制      §5 人工复核      §6 标注闭环                               ║
# ║   §7 模型训练      §8 全球站点      §9 运维稳定性                             ║
# ║                                                                              ║
# ║  路径均相对于项目根目录（base_dir），由 config_loader 解析为绝对路径。         ║
# ║  所有路径 / 关键参数均支持环境变量覆盖（见 config_loader.py）。               ║
# ╚══════════════════════════════════════════════════════════════════════════════╝


# ── §1 系统基础 ────────────────────────────────────────────────────────────────
# 整个 pipeline 的全局身份与运行环境。

modality: video          # 数据模态：video | image | audio（扩展中）
timezone: "America/Toronto"   # 本地时区（用于批次命名、日志时间戳）

logging:
  max_bytes: 10485760    # 单日志文件上限 10 MB，超限轮转
  backup_count: 5        # 保留最近 5 个历史日志文件


# ── §2 存储路径 ────────────────────────────────────────────────────────────────
# 所有目录只在此处定义，代码通过 cfg["paths"] 读取，不硬编码路径。
# 边缘部署时改此处即可，其余代码不动。

paths:
  # 数据流主路径
  raw_video:          "storage/raw"              # 原材料投入口（Guard 模式监控此目录）
  data_warehouse:     "storage/archive"          # 归档成品库（批次目录落盘）
  rejected_material:  "storage/rejected"         # 质检不合格
  redundant_archives: "storage/redundant"        # 重复文件隔离
  quarantine:         "storage/quarantine"       # Ingest 预检失败（解码错误/重复）

  # 标注闭环路径
  labeling_export:    "storage/for_labeling"     # 待标注图片输出（送 CVAT）
  labeled_return:     "storage/labeled_return"   # 标注员回传落盘
  training:           "storage/training"         # 达标数据并入训练集

  # 运维 / 测试路径
  reports:            "storage/reports"          # QC 报表
  golden:             "storage/golden"           # 黄金库：开机自检用参考视频
  pending_review:     "storage/pending_review"   # 人工复核队列（中控台）
  test_source:        "storage/test/original"    # 测试模式源目录（不被 pipeline 改动）
  logs:               "logs"

  # 批次目录命名规则（path decoupling：改名只改此处）
  batch_prefix:       "Batch_"
  batch_fails_suffix: "_Fails"
  batch_subdirs:
    reports:    "reports"
    source:     "source"
    refinery:   "refinery"      # 高置信伪标签帧
    inspection: "inspection"    # 低置信待人工标注帧
    labeled:    "labeled"       # 标注回传按 batch_id 写回

  # 启动时自动创建的目录列表
  ensure_dirs: [raw_video, data_warehouse, rejected_material, redundant_archives,
                reports, labeling_export, labeled_return, training, golden,
                test_source, pending_review, quarantine, logs]

  # Dashboard 端口（厂长中控台，docker-compose 中已映射）
  dashboard_port: 8765


# ── §3 数据摄入 (Ingest) ───────────────────────────────────────────────────────
# 控制 Guard 模式如何扫描 raw/ 目录、识别文件、执行预检。

ingest:
  batch_wait_seconds: 8          # 文件写入稳定等待时间（防止文件还在拷贝中就被摄入）
  file_stable_check_interval: 1  # 稳定性检查间隔（秒）
  file_stable_min_seconds: 2     # 文件大小不变持续此秒数才视为稳定
  poll_interval_seconds: 30      # 轮询兜底周期（Watchdog 漏检时补救，0=关闭）
  health_port: 0                 # Guard 模式健康检查端口（0=不启动；建议 8766）

  video_extensions: [".mp4", ".mov", ".avi", ".mkv"]
  image_extensions: [".jpg", ".jpeg", ".png"]
  image_mode: "auto"             # auto=自动判断；true=强制图片；false=强制视频；both=混合

  # 预检三道门（建议全开，不合格项移入 quarantine）
  pre_filter_enabled: true       # 是否启用 Ingest 预检
  dedup_at_ingest: true          # 入库前去重（基于 MD5 指纹）
  decode_check_at_ingest: true   # 首帧解码检查（检测损坏文件）


# ── §4 质量控制 (QC) ───────────────────────────────────────────────────────────
# 帧级质量指标阈值 → 批次合格门槛 → YOLO 视觉检测。

# 4a. 帧级质量阈值（超出范围的帧被标记为不合格）
quality_thresholds:
  min_brightness: 55.0     # 亮度下限（低于 = Too Dark）
  max_brightness: 225.0    # 亮度上限（高于 = Harsh Light）
  min_blur_score: 20.0     # 清晰度下限，Laplacian 方差（低于 = Blurry）
  min_contrast: 15.0       # 对比度下限，灰度标准差（低于 = Low Contrast）
  max_contrast: 100.0      # 对比度上限（高于 = High Contrast）
  max_jitter: 35.0         # 帧间抖动上限（高于 = High Jitter）

# 4b. 批次合格门槛与分流策略
production_setting:
  qc_sample_seconds: 10    # 每视频抽检帧间隔（秒），越小越精确、越慢
  pass_rate_gate: 85.0     # 单门槛：合格帧占比 >= 此值才通过

  # 双门槛模式（null = 关闭，使用单门槛）
  dual_gate_high: null     # >= 此值自动放行（免人工复核）
  dual_gate_low: null      # <  此值自动拦截（强制进 rejected）

  save_normal: true        # 是否落盘 Normal 帧
  save_warning: true       # 是否落盘 Warning 帧
  save_only_screened: false  # true=只落盘「有 YOLO 检测」的帧（大幅减少存储）

  # YOLO 置信度分流：高置信 → refinery（伪标签），低置信 → inspection（待人工标注）
  confidence_tiered_output: true
  refinery_top_pct: 30                        # 置信度前 N% 的帧进 refinery（0=关闭，用固定门槛）
  approved_split_confidence_threshold: 0.60   # 固定门槛（refinery_top_pct=0 时生效）
  refinery_min_confidence: 0.65               # 绝对下限：低于此值强制进 inspection

  human_review_flat: true  # inspection 精简模式：Normal/Warning 合并，只保留图+txt

  # 视频级三档分流（高/标准/低质量视频）
  video_tier_high_detection_rate: 0.60
  video_tier_high_conf: 0.70
  video_tier_low_detection_rate: 0.30
  video_tier_low_conf: 0.50

# 4c. YOLO 视觉检测
vision:
  enabled: true
  model_path: "models:/vehicle_detector/1"   # MLflow Registry URI；回退用 "models/yolov8s.pt"
  sample_seconds: 5      # YOLO 抽帧间隔（秒）

  # 推理加速（按需开启）
  use_i_frame_only: false     # 只解 I 帧，减少解码量（需 ffprobe）
  motion_threshold: 0         # 运动唤醒：帧差低于此值跳过 YOLO（0=关闭）
  cascade_light_model_path: ""  # 级联轻量初筛模型路径（空=关闭）
  cascade_light_conf: 0.2

  # 推理参数
  conf: 0.25             # 置信度阈值
  iou: 0.45              # NMS IoU 阈值
  classes: [2, 5, 7]    # 检测类别：car(2) bus(5) truck(7)；null=全部
  device: null           # 推理设备："cuda:0" / "cpu" / null（自动）
  max_det: 300
  imgsz: 640             # 输入分辨率（边长）
  half: false            # FP16 半精度（仅 GPU）
  verbose: false


# ── §5 人工复核 ────────────────────────────────────────────────────────────────
# 双门槛中间态（或单门槛边缘批次）进入人工复核队列。

review:
  mode: dashboard        # terminal=终端逐项 y/n；dashboard=中控台 Web 复核
  timeout_seconds: 600   # 终端模式超时自动跳过
  valid_inputs: ["y", "n", "all", "none"]


# ── §6 标注闭环 ────────────────────────────────────────────────────────────────
# CVAT 上传 → 待标池管理 → 标注回传校验。

# 6a. CVAT 上传配置
cvat:
  upload_pseudo_labels: false   # true=上传伪标签供标注员参考；false=图片只标，从零开始

# 6b. 待标池：每批归档后自动将 inspection 帧追加到 for_labeling
labeling_pool:
  auto_update_after_batch: true
  upload_inspection: true        # inspection 全量进待标池
  refinery_sample_rate: 0.05    # refinery 抽样比例（按视频分层）；0=不抽

# 6c. 标注回传：伪标签一致性校验与报警
labeled_return:
  consistency_threshold: 0      # IoU 一致率门槛；0=仅记录不报警
  alert_via_email: true         # 一致率不达标时发邮件报警
  skip_empty_labels: true       # 并入训练集时跳过无标注图（减少冗余）
  alert_threshold_step: 0.05    # Refinery 抽检报警邮件中，建议提高置信阈值的步长


# ── §7 模型训练与追踪 ──────────────────────────────────────────────────────────

mlflow:
  enabled: true
  experiment_name: "datafactory"
  tracking_uri: "http://0.0.0.0:5001"   # MLflow 服务地址；null=退回本地 SQLite

version_mapping:
  algorithm_version: "rules_v1"   # 规则质检算法版本（写入血缘记录）
  vision_model_version: ""        # 留空则由运行时从模型路径自动填充


# ── §8 全球站点 (HQ Dashboard) ────────────────────────────────────────────────
# HQ 大屏站点卡片：本地时钟 + Open-Meteo 天气。
# 新增站点：复制任意一组，填写 timezone / lat / lon。

sites:
  sudbury:
    timezone: "America/Toronto"
    lat: 46.4917
    lon: -81.0000
  pilbara:
    timezone: "Australia/Perth"
    lat: -23.3517
    lon: 119.7200
  atacama:
    timezone: "America/Santiago"
    lat: -24.5000
    lon: -69.2500


# ── §9 运维与稳定性 ────────────────────────────────────────────────────────────
# 邮件通知、文件重试、磁盘保护、开机自检。

# 9a. 邮件通知（QC 报警 / 磁盘告急 / 标注回传异常）
email_setting:
  smtp_server: "smtp.mail.me.com"
  smtp_port: 587
  sender: "smileyimao@icloud.com"
  receiver: "xituled@gmail.com"
  max_retries: 3
  retry_delay_seconds: 5

# 9b. 文件操作重试（应对 NFS 抖动 / 边缘磁盘瞬时故障）
retry:
  max_attempts: 3
  backoff_seconds: 1.0

# 9c. 开机自检
startup_self_check: true     # 启动时校验配置 + 关键目录可写，失败则退出
startup_golden_run: false    # true=用 golden/ 下视频真跑一遍 QC，边缘部署建议开启

# 9d. 滚动清零（防止日志/报表无限堆积）
rolling_cleanup:
  logs_retention_days: 30      # 日志保留天数（0=不自动删）
  reports_retention_days: 30   # 报表保留天数（0=不自动删）
  archive_retention_days: 0    # 归档批次保留天数（0=不自动删，谨慎开启）

# 9e. 磁盘用量预警
disk_check:
  enabled: true
  warn_pct: 80       # 使用率超过此值 → WARNING 日志
  critical_pct: 90   # 使用率超过此值 → CRITICAL 日志 + 邮件
