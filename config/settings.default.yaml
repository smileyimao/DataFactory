# 🏭 DataFactory 默认配置（勿直接编辑；用 scripts/reset_config.py 恢复到此状态）
# 路径均相对于项目根目录 (base_dir)，由 config_loader 解析为绝对路径

paths:
  raw_video: "storage/raw"
  data_warehouse: "storage/archive"
  rejected_material: "storage/rejected"
  redundant_archives: "storage/redundant"
  reports: "storage/reports"
  labeling_export: "storage/for_labeling"
  golden: "storage/golden"
  logs: "logs"
  db_file: "db/factory_admin.db"

ingest:
  batch_wait_seconds: 8
  video_extensions: [".mp4", ".mov", ".avi", ".mkv"]
  file_stable_check_interval: 1
  file_stable_min_seconds: 2

quality_thresholds:
  min_brightness: 55.0
  max_brightness: 225.0
  min_blur_score: 20.0
  min_contrast: 15.0
  max_contrast: 100.0
  max_jitter: 35.0

production_setting:
  qc_sample_seconds: 10
  pass_rate_gate: 85.0
  dual_gate_high: null
  dual_gate_low: null
  save_normal: true
  save_warning: true

review:
  timeout_seconds: 600
  valid_inputs: ["y", "n", "all", "none"]

email_setting:
  smtp_server: "smtp.mail.me.com"
  smtp_port: 587
  sender: ""
  receiver: ""

# v2.0 视觉质检（YOLO）：默认关闭，新手可先跑通规则质检再开启
vision:
  enabled: false
  model_path: ""
  sample_seconds: 10
  conf: 0.25
  iou: 0.45
  classes: null
  device: null
  max_det: 300
  imgsz: 640
  half: false
  verbose: false

mlflow:
  enabled: false
  experiment_name: "datafactory"
  tracking_uri: null

version_mapping:
  algorithm_version: "rules_v1"
  vision_model_version: ""

startup_self_check: true
startup_golden_run: false

rolling_cleanup:
  logs_retention_days: 30
  reports_retention_days: 30
  archive_retention_days: 0
